name: Update events data

on:
  schedule:
    # Refresh a few times a day (UTC). 13:00 and 01:00 UTC ≈ 6a/6p Pacific.
    - cron: "0 1,13 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/fetch_events.py"
      - ".github/workflows/update-events.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install certifi

      - name: Fetch and build events.json
        run: python3 scripts/fetch_events.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/events.json; then
            git add data/events.json
            git commit -m "Update events data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes to events data."
          fi
